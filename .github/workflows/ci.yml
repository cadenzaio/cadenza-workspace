name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - run: ./scripts/check-agent-harness.sh
      - run: node scripts/prepare-public-workspace.mjs --check

  release-metadata:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: cadenzaio/cadenza
          ref: v4.0.0-rc.1
          path: cadenza
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: cadenzaio/cadenza-python
          ref: v0.1.0-rc.1
          path: cadenza-python
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: cadenzaio/cadenza-elixir
          ref: v0.1.0-rc.1
          path: cadenza-elixir
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: cadenzaio/cadenza-csharp
          ref: v0.1.0-rc.1
          path: cadenza-csharp
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: cadenzaio/cadenza-environment
          ref: v0.1.0-rc.1
          path: cadenza-environment
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: cadenzaio/cadenza-chamber
          ref: v0.1.0-rc.1
          path: cadenza-chamber
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: cadenzaio/cadenza-cell
          ref: v0.1.0-rc.1
          path: cadenza-cell
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: cadenzaio/cadenza-reference-system
          ref: v0.1.0-rc.1
          path: cadenza-reference-system
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - run: node scripts/validate-release-candidate.mjs
      - run: node scripts/check-contract-snapshots.mjs
      - run: node scripts/check-public-documentation-links.mjs
      - run: node scripts/validate-architecture-atlas.mjs --require-rendered
      - run: node scripts/generate-architecture-atlas-catalog.mjs --check
